<ion-content class="auth-page-content">
  <div class="forgot-container animate-in">
    <div class="clinic-card">
      <div class="header-section">
        <h1 class="font-display text-teal">Forgot Password</h1>
        <p class="tagline">Enter your email and we'll send you a link to reset your password.</p>
      </div>

      <div *ngIf="!emailSent()">
        <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
          <div class="clinic-input-item">
            <ion-label>Email Address</ion-label>
            <ion-input
              type="email"
              formControlName="email"
              placeholder="name@example.com"
            ></ion-input>
          </div>

          <div class="form-actions">
            <ion-button 
              expand="block" 
              type="submit" 
              [disabled]="forgotForm.invalid || isLoading()"
            >
              <ion-spinner *ngIf="isLoading()" name="crescent"></ion-spinner>
              <span *ngIf="!isLoading()">Send Reset Link</span>
            </ion-button>
          </div>
        </form>
      </div>

      <div *ngIf="emailSent()" class="success-message">
        <ion-icon name="mail-unread-outline" color="primary"></ion-icon>
        <h2>Check your email for a reset link.</h2>
        <p>If an account exists for <strong>{{ forgotForm.value.email }}</strong>, a password reset link has been sent.</p>
        <ion-button expand="block" routerLink="/auth/login" fill="clear">
          Back to Login
        </ion-button>
      </div>

      <div class="back-link" *ngIf="!emailSent()">
        <a routerLink="/auth/login">Back to Sign In</a>
      </div>
    </div>
  </div>
</ion-content>
