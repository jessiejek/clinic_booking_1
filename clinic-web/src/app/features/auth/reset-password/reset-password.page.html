<ion-content class="auth-page-content">
  <div class="reset-container animate-in">
    <div class="clinic-card">
      <div class="header-section">
        <h1 class="font-display text-teal">Reset Password</h1>
        <p class="tagline">Enter your new password below.</p>
      </div>

      <div *ngIf="token(); else noToken">
        <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
          <div class="clinic-input-item">
            <ion-label>New Password</ion-label>
            <ion-input
              type="password"
              formControlName="password"
              placeholder="Minimum 8 characters"
            ></ion-input>
          </div>

          <div class="clinic-input-item">
            <ion-label>Confirm Password</ion-label>
            <ion-input
              type="password"
              formControlName="confirmPassword"
              placeholder="Re-type password"
            ></ion-input>
            <ion-note color="danger" *ngIf="resetForm.hasError('mismatch') && resetForm.get('confirmPassword')?.touched">
              Passwords do not match
            </ion-note>
          </div>

          <div class="form-actions">
            <ion-button 
              expand="block" 
              type="submit" 
              [disabled]="resetForm.invalid || isLoading()"
            >
              <ion-spinner *ngIf="isLoading()" name="crescent"></ion-spinner>
              <span *ngIf="!isLoading()">Update Password</span>
            </ion-button>
          </div>
        </form>
      </div>

      <ng-template #noToken>
        <div class="error-state">
          <ion-icon name="alert-circle-outline" color="danger"></ion-icon>
          <h2>Invalid or expired link</h2>
          <p>This password reset link is invalid or has expired. Please request a new one.</p>
          <ion-button expand="block" routerLink="/auth/forgot-password" fill="outline">
            Request New Link
          </ion-button>
        </div>
      </ng-template>

      <div class="back-link">
        <a routerLink="/auth/login">Back to Sign In</a>
      </div>
    </div>
  </div>
</ion-content>
