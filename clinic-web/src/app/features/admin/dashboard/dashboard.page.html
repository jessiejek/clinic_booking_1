<ion-menu contentId="main-content" type="overlay">
  <ion-content>
    <div class="menu-logo">
      <div class="menu-logo__name">Clinic System</div>
      <div class="menu-logo__tagline">Administrator Portal</div>
    </div>

    <ion-list lines="none">
      <ion-item routerLink="/admin/dashboard" routerLinkActive="active">
        <ion-icon slot="start" name="grid-outline"></ion-icon>
        <ion-label>Dashboard</ion-label>
      </ion-item>
      <ion-item class="placeholder-link">
        <ion-icon slot="start" name="people-outline"></ion-icon>
        <ion-label>Doctors</ion-label>
      </ion-item>
      <ion-item class="placeholder-link">
        <ion-icon slot="start" name="medical-outline"></ion-icon>
        <ion-label>Services</ion-label>
      </ion-item>
      <ion-item class="placeholder-link">
        <ion-icon slot="start" name="calendar-outline"></ion-icon>
        <ion-label>Bookings</ion-label>
      </ion-item>
      <ion-item class="placeholder-link">
        <ion-icon slot="start" name="settings-outline"></ion-icon>
        <ion-label>Settings</ion-label>
      </ion-item>
    </ion-list>
  </ion-content>
  
  <ion-footer class="ion-no-border">
    <ion-item lines="none" (click)="logout()" class="logout-item">
      <ion-icon slot="start" name="log-out-outline"></ion-icon>
      <ion-label>Logout</ion-label>
    </ion-item>
  </ion-footer>
</ion-menu>

<div class="ion-page" id="main-content">
  <ion-header class="clinic-header">
    <ion-toolbar>
      <ion-buttons slot="start">
        <ion-menu-button></ion-menu-button>
      </ion-buttons>
      <ion-title class="clinic-page-title">Dashboard</ion-title>
      <ion-buttons slot="end">
        <ion-button fill="clear">
          <ion-icon name="notifications-outline"></ion-icon>
        </ion-button>
        <ion-avatar class="user-avatar">
          <img src="https://ionicframework.com/docs/img/demos/avatar.svg" />
        </ion-avatar>
      </ion-buttons>
    </ion-toolbar>
  </ion-header>

  <ion-content class="ion-padding" style="--background: var(--clinic-surface-alt)">
    <div class="welcome-banner animate-in">
      <h2 class="font-display">Welcome back, {{ firstName }}</h2>
      <p>Here is what's happening in your clinic today.</p>
    </div>

    <div class="stats-grid">
      <!-- Placeholder stats -->
      <div class="clinic-card stat-card">
        <h3>Appointments</h3>
        <p class="stat-value">12</p>
      </div>
      <div class="clinic-card stat-card">
        <h3>Revenue</h3>
        <p class="stat-value">₱24,500</p>
      </div>
    </div>
  </ion-content>
</div>
